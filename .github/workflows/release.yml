name: release-flutter

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release (if missing)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  build-flutter-android:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: aarch64-linux-android,x86_64-linux-android,armv7-linux-androideabi

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install cargo-ndk
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Build chaos-ffi (Android)
        run: |
          cargo ndk -t arm64-v8a build -p chaos-ffi --release --no-default-features
          cargo ndk -t x86_64 build -p chaos-ffi --release --no-default-features
          cargo ndk -t armeabi-v7a build -p chaos-ffi --release --no-default-features

      - name: Copy chaos-ffi to jniLibs
        run: |
          out="chaos-flutter/android/app/src/main/jniLibs"
          mkdir -p "$out/arm64-v8a" "$out/x86_64" "$out/armeabi-v7a"
          cp -f target/aarch64-linux-android/release/libchaos_ffi.so "$out/arm64-v8a/"
          cp -f target/x86_64-linux-android/release/libchaos_ffi.so "$out/x86_64/"
          cp -f target/armv7-linux-androideabi/release/libchaos_ffi.so "$out/armeabi-v7a/"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Flutter Android
        run: |
          cd chaos-flutter
          flutter pub get
          flutter build apk --release

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: chaos-flutter/build/app/outputs/flutter-apk/app-release.apk
