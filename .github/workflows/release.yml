name: release-cli

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release (if missing)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  build-cli:
    needs: create_release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI (release)
        run: cargo build -p chaos-cli --release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if ($IsWindows) {
            Compress-Archive -Force -Path "target/release/chaos-cli.exe" -DestinationPath dist/chaos-cli-${{ matrix.platform }}.zip
          } else {
            tar -czf dist/chaos-cli-${{ matrix.platform }}.tar.gz -C target/release chaos-cli
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chaos-cli-*
