name: release

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release (if missing)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Generate release notes and update body (existing release too)
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');

            // Ask GitHub to generate release notes for this tag (based on commits/PRs since previous tag).
            const notes = await github.request('POST /repos/{owner}/{repo}/releases/generate-notes', {
              owner,
              repo,
              tag_name: tag,
            });
            const body = (notes.data && notes.data.body) ? String(notes.data.body) : '';

            // Upsert the release body. We only override when it's empty to avoid clobbering manual edits.
            const rel = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            const current = (rel.data.body || '').trim();
            if (current.length === 0) {
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: rel.data.id,
                tag_name: tag,
                name: rel.data.name || tag,
                body,
              });
              core.info(`Updated release body for ${tag}`);
            } else {
              core.info(`Release body already set for ${tag}; skipping overwrite`);
            }

  ffi_windows:
    needs: create_release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build chaos-ffi (release)
        run: cargo build -p chaos-ffi --release --no-default-features

      - name: Package chaos-ffi
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dll = Join-Path "target/release" "chaos_ffi.dll"
          if (!(Test-Path $dll)) { throw "missing $dll" }
          $hdr = Join-Path "chaos-ffi/include" "chaos_ffi_bindings.h"
          if (!(Test-Path $hdr)) { throw "missing $hdr" }
          Compress-Archive -Force -Path $dll, $hdr -DestinationPath dist/chaos-ffi-windows-x86_64.zip

      - name: Upload Release Assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          gh release upload "${{ github.ref_name }}" `
            dist/chaos-ffi-windows-x86_64.zip `
            --clobber

  ffi_linux:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build chaos-ffi (release)
        run: cargo build -p chaos-ffi --release --no-default-features

      - name: Package chaos-ffi
        run: |
          set -euo pipefail
          mkdir -p dist
          pkg="dist/pkg-linux-x86_64"
          rm -rf "$pkg"
          mkdir -p "$pkg/include"
          cp -f target/release/libchaos_ffi.so "$pkg/"
          cp -f chaos-ffi/include/chaos_ffi_bindings.h "$pkg/include/"
          tar -czf dist/chaos-ffi-linux-x86_64.tar.gz -C "$pkg" .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chaos-ffi-linux-x86_64.tar.gz

  ffi_macos:
    needs: create_release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build chaos-ffi (release, aarch64)
        run: cargo build -p chaos-ffi --release --target aarch64-apple-darwin --no-default-features

      - name: Build chaos-ffi (release, x86_64)
        run: cargo build -p chaos-ffi --release --target x86_64-apple-darwin --no-default-features

      - name: Package chaos-ffi (universal2)
        run: |
          set -euo pipefail
          mkdir -p dist
          dylib_a="target/aarch64-apple-darwin/release/libchaos_ffi.dylib"
          dylib_x="target/x86_64-apple-darwin/release/libchaos_ffi.dylib"
          test -f "$dylib_a"
          test -f "$dylib_x"
          pkg="dist/pkg-macos-universal2"
          rm -rf "$pkg"
          mkdir -p "$pkg/include"
          lipo -create -output "$pkg/libchaos_ffi.dylib" "$dylib_a" "$dylib_x"
          cp -f chaos-ffi/include/chaos_ffi_bindings.h "$pkg/include/"
          tar -czf dist/chaos-ffi-macos-universal2.tar.gz -C "$pkg" .

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chaos-ffi-macos-universal2.tar.gz

  core_crates:
    needs: create_release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build core crates
        run: cargo build --release

      - name: Test core crates
        run: cargo test --release

      - name: Generate changelog
        run: |
          echo "## Core Crates" > dist/CHANGELOG.md
          echo "" >> dist/CHANGELOG.md
          echo "- chaos-core: 核心库" >> dist/CHANGELOG.md
          echo "- chaos-ffi: FFI 绑定" >> dist/CHANGELOG.md
          echo "- chaos-proto: 协议定义" >> dist/CHANGELOG.md
          echo "- chaos-daemon: 后台服务" >> dist/CHANGELOG.md
          echo "- chaos-app: 应用层" >> dist/CHANGELOG.md

      - name: Upload changelog
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CHANGELOG.md
