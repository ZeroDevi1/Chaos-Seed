name: release-tauri

on:
  push:
    tags:
      - "v*.*.*"
      - "*.*.*"

permissions:
  contents: write

jobs:
  create_release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release (if missing)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true

  build-tauri:
    needs: create_release
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (1.93.0)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: cd chaos-tauri && npm install

      - name: Build Tauri (release)
        run: cd chaos-tauri && npm run tauri:build:nobundle

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          # 根据不同平台打包
          if ($IsWindows) {
            Compress-Archive -Force -Path "chaos-tauri/src-tauri/target/release/chaos-tauri.exe" -DestinationPath dist/chaos-tauri-${{ matrix.platform }}.zip
          } elseif ($IsMacOS) {
            tar -czf dist/chaos-tauri-${{ matrix.platform }}.tar.gz -C chaos-tauri/src-tauri/target/release chaos-tauri
          } else {
            tar -czf dist/chaos-tauri-${{ matrix.platform }}.tar.gz -C chaos-tauri/src-tauri/target/release chaos-tauri
          }

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/chaos-tauri-*
